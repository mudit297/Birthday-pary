<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        color: white;
        padding: 20px;
    }

    .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        padding: 30px 20px;
        border-radius: 25px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        z-index: 2;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 15px;
        animation: bounce 2s infinite;
    }

    .cake {
        font-size: 5rem;
        margin: 15px 0;
    }

    p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 25px;
    }

    button {
        background: white;
        color: #ff4b6e;
        border: none;
        padding: 14px 28px;
        border-radius: 30px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .hidden-message {
        display: none;
        margin-top: 20px;
        font-size: 1.1rem;
        animation: fadeIn 1s;
    }

    @keyframes bounce {
        0%, 100% {
            transform: translateY(0);
        }
        50% {
            transform: translateY(-10px);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 1;
    }

    @media (max-width: 480px) {
        h1 {
            font-size: 2rem;
        }

        .cake {
            font-size: 4rem;
        }

        p {
            font-size: 1rem;
        }

        button {
            width: 100%;
        }
    }
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎉 Happy Birthday! 🎉</h1>

    <div class="cake">🎂</div>

    <p>
        Wishing you a day filled with happiness, laughter,
        and unforgettable moments. May all your dreams
        come true and may this year bring you endless joy! ❤️
    </p>

    <button onclick="showMessage()">
        Open Birthday Surprise 🎁
    </button>

    <div class="hidden-message" id="message">
        🌟 You are amazing and deserve all the happiness in the world.
        Have a fantastic birthday and an incredible year ahead! 🥳💖
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById("message").style.display = "block";
    }

    // Confetti Animation
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const confetti = [];

    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            r: Math.random() * 6 + 2,
            d: Math.random() * 150,
            color: `hsl(${Math.random() * 360}, 100%, 60%)`,
            tilt: Math.random() * 10 - 10,
            speed: Math.random() * 3 + 2
        });
    }

    function drawConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        confetti.forEach(c => {
            ctx.beginPath();
            ctx.fillStyle = c.color;
            ctx.fillRect(c.x, c.y, c.r, c.r * 1.5);
        });

        updateConfetti();

        requestAnimationFrame(drawConfetti);
    }

    function updateConfetti() {
        confetti.forEach(c => {
            c.y += c.speed;
            c.x += Math.sin(c.d);

            if (c.y > canvas.height) {
                c.y = -20;
                c.x = Math.random() * canvas.width;
            }
        });
    }

    drawConfetti();

    window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
